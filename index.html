<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta charset="UTF-8">
    <title>Word coach</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Search section -->
    <section id="search-screen" class="screen">
        <div class="card">
            <h1>Word Coach</h1>
            <div class="search-ctn">
         <input type="text" id="word-input" placeholder="Enter a word...">
            <button id="search-btn" onclick="handleSearch()">
   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <circle cx="11" cy="11" r="7" stroke="#5f6368" stroke-width="2"/>
  <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="#5f6368" stroke-width="2" stroke-linecap="round"/>
</svg>
                </button>
            </div>
            <div id="error-msg"></div>
        </div>
    </section>
    
        <!-- Result section -->
    <section id="result-screen" class="screen">
        <div class="card">
            <h1>Definition</h1>
            <div id="word-display"></div>
            <button id="back-btn" onclick="showScreen('search-screen')">Back</button>
        </div>
    </section>
    <script src="main.js"></script>
</body>
</html>
