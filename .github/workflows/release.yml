name: Auto Versioning
on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      # 1. Pull the code (fetch-depth: 0 is required to see all history/tags)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Run the Versioning Brain
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Use 'sed' to inject the version into index.html
      - name: Update Version in HTML
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          sed -i "s/APP_VERSION/${{ steps.semantic.outputs.new_release_version }}/g" index.html
          
      # 4. Commit the change back to the repo
      - name: Commit version change
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add index.html
          git commit -m "chore: bump version to ${{ steps.semantic.outputs.new_release_version }} [skip ci]"
          git push
